name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle.properties', '**/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew :common:test --no-daemon

      - name: Build NeoForge
        run: ./gradlew :neoforge:build --no-daemon

      - name: Build Fabric
        run: ./gradlew :fabric:build --no-daemon

      - name: Upload NeoForge jar
        uses: actions/upload-artifact@v4
        with:
          name: neoforge
          path: neoforge/build/libs/*.jar

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: fabric
          path: fabric/build/libs/*.jar
